[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[functions."generate-brief"]
  timeout = 26

[functions."generate-mil-a"]
  timeout = 26

[functions."generate-mil-b"]
  timeout = 26

[functions."generate-brief-a"]
  timeout = 26

[functions."generate-brief-b"]
  timeout = 26

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  autoLaunch = false
