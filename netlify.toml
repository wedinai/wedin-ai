[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200
  force = true

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  directory = "netlify/functions"

[functions."generate-brief"]
  timeout = 26

[functions."generate-mil-a"]
  timeout = 26

[functions."generate-mil-b"]
  timeout = 26

[functions."generate-brief-a"]
  timeout = 26

[functions."generate-brief-b"]
  timeout = 26

[functions."generate-budget"]
  timeout = 26

[functions."generate-moment-summary"]
  timeout = 26

[functions."generate-education"]
  timeout = 26

[functions."generate-spotify-tracks"]
  timeout = 26

[functions."create-spotify-playlist"]
  timeout = 26

[functions."send-remarketing"]
  schedule = "0 8 * * *"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  autoLaunch = false
